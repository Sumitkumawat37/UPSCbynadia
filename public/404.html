<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>UPSC by Nadiya Ma'am</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query
      // string into just a query string, and then redirects the browser
      // to the new url with only a query string and hash fragment,
      // e.g. http://www.foo.tld/one/two?a=b&c=d#qwe, becomes
      // http://www.foo.tld/?p=/one/two&q=a%3Db%26c%3Dd#qwe
      // Note: this 404.html file must be at least 512 bytes for it to work
      // with Internet Explorer (it is currently > 512 bytes)

      // If you're creating a Project Pages site and NOT using a custom domain,
      // then set segmentCount to 1. Enterprise users who are using custom domains
      // should set segmentCount to the number of path segments in your custom
      // domain, for example www.yourdomain.com has a segmentCount of 1.
      var segmentCount = 1;

      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + segmentCount)
            .join('/') +
          '/?p=/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(segmentCount)
            .join('/')
            .join('/') +
          (l.search ? '&q=' + l.search.slice(1).replace(/[&]/g, '%26') : '') +
          l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
